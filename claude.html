<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Five Boxes</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0e0e0e;
      font-family: 'Space Mono', monospace;
    }

    .grid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .row {
      display: flex;
      gap: 18px;
    }

    .box {
      width: 160px;
      height: 160px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      animation: pop 0.5s cubic-bezier(.34,1.56,.64,1) both;
    }

    .box:hover {
      transform: translateY(-6px) scale(1.04);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    .box:nth-child(1) { animation-delay: 0.05s; }
    .box:nth-child(2) { animation-delay: 0.15s; }

    .row:nth-child(2) .box:nth-child(1) { animation-delay: 0.25s; }
    .row:nth-child(2) .box:nth-child(2) { animation-delay: 0.35s; }

    .row:nth-child(3) .box { animation-delay: 0.45s; }

    @keyframes pop {
      from { opacity: 0; transform: scale(0.7) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Individual colors */
    .b1 { background: #E84855; box-shadow: 0 8px 24px rgba(232,72,85,0.35); }
    .b2 { background: #3D9BE9; box-shadow: 0 8px 24px rgba(61,155,233,0.35); }
    .b3 { background: #F4A11D; box-shadow: 0 8px 24px rgba(244,161,29,0.35); }
    .b4 { background: #3EC97D; box-shadow: 0 8px 24px rgba(62,201,125,0.35); }
    .b5 { background: #9B59F5; box-shadow: 0 8px 24px rgba(155,89,245,0.35); }
  </style>
</head>
<body>
  <div class="grid">
    <!-- Row 1: 2 boxes -->
    <div class="row">
      <div class="box b1">01</div>
      <div class="box b2">02</div>
    </div>
    <!-- Row 2: 2 boxes -->
    <div class="row">
      <div class="box b3">03</div>
      <div class="box b4">04</div>
    </div>
    <!-- Row 3: 1 centered box -->
    <div class="row">
      <div class="box b5">05</div>
    </div>
  </div>
</body>
</html>
